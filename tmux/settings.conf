set -g default-terminal "screen-256color"

set -sg escape-time 0
set -g status-style "fg=#3B4B5F,bg=#151B23"
# disable status bar
set -g status off

set -g mouse on

# Bind right-click to paste from clipboard (macOS)
bind-key -n MouseDown3Pane run-shell "tmux set-buffer \"$(pbpaste)\"; tmux paste-buffer"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

is_large_window='echo "$(tmux display-message -p #{window_width}) >= 190"|bc|grep 1'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'

# bind ctrl-hjkl to switch panes and splits in vim
bind-key -n 'C-h' if-shell "$is_large_window" {
    if-shell "$is_vim" {
        send-keys C-h
    } {
        select-pane -L
    }
} {
    if-shell "$is_vim" {
        send-keys C-h
    } {
        select-pane -LZ
    }
}

bind-key -n 'C-l' if-shell "$is_large_window" {
    if-shell "$is_vim" {
        send-keys C-l
    } {
        select-pane -R
    }
} {
    if-shell "$is_vim" {
        send-keys C-l
    } {
        select-pane -RZ
    }
}

bind-key -n 'C-j' if-shell "$is_large_window" {
    if-shell "$is_vim" {
        send-keys C-j
    } {
        select-pane -D
    }
} {
    if-shell "$is_vim" {
        send-keys C-j
    } {
        select-pane -DZ
    }
}

bind-key -n 'C-k' if-shell "$is_large_window" {
    if-shell "$is_vim" {
        send-keys C-k
    } {
        select-pane -U
    }
} {
    if-shell "$is_vim" {
        send-keys C-k
    } {
        select-pane -UZ
    }
}

if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"

if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

# bind shift-arrow to switch sessions (rebound in terminal to ctrl-option-command-arrow)
bind-key -n 'S-Left' 'switch-client -p'
bind-key -n 'S-Right' 'switch-client -n'

# return to default layout with Ctrl-B F1
bind -n F1 select-layout '65dd,284x58,0,0{85x58,0,0[85x29,0,0,0,85x28,0,30,2],198x58,86,0,1}'

# bind shift-pageup, shift-pagedown, shift-home to switch and create sessions.
# rebound in termin to ctrl-option-command-pgup, ctrl-option-command-pgdown
# and ctrl-option-command-home
bind-key -n 'S-Pageup' 'next-window'
bind-key -n 'S-Pagedown' 'previous-window'
bind-key -n 'S-Home' 'new-window; split-window -h; select-pane -L'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# toggle pane zoom
bind-key -n 'C-_' resize-pane -Z

# pane background color
set -g window-style bg=#171b22
set -g window-active-style bg=#0f1216

# pane border colors 
set -g pane-border-style 'fg=#0E1216,bg=#171b22' 
set -g pane-active-border-style 'fg=#181E26,bg=#171b22'
